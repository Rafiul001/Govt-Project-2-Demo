# nginx config for a public DEMO over plain HTTP — production topology, no TLS.
#
# Same layout and hardening as nginx.conf minus everything TLS-dependent
# (certificates, the 80→443 redirect, and HSTS — sending HSTS over HTTP is
# meaningless and would break the site later if a cert is ever misconfigured).
# Use this when showing the demo on a real domain before certificates are
# ready. Switch to nginx.conf for real production — the site handles logins
# and uploads, which shouldn't travel unencrypted longer than necessary.
# Enable only ONE of nginx.conf / nginx-demo.conf / nginx-test.conf at a
# time — they define the same upstreams and would clash.
#
# DNS (replace rida-project.com with the demo domain):
#   A  @    → server IP
#   A  *    → server IP   (branch subdomains are created dynamically)
#   A  app  → server IP   (covered by * if present)
#   A  api  → server IP   (optional)
#
# Build the front-ends with HTTP origins so previews/postMessage work:
#   VITE_LANDING_URL=http://rida-project.com            (admin panel build)
#   NEXT_PUBLIC_DASHBOARD_URL=http://app.rida-project.com  (landing build)
#
# Install:
#   sudo cp deploy/nginx-demo.conf /etc/nginx/sites-available/govt-project-demo.conf
#   sudo ln -s /etc/nginx/sites-available/govt-project-demo.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

upstream landing_upstream {
    server 127.0.0.1:3001;
    keepalive 16;
}

upstream api_upstream {
    server 127.0.0.1:3000;
    keepalive 16;
}

# ---------------------------------------------------------------
# Landing sites (Next.js) — apex + every branch subdomain
# ---------------------------------------------------------------
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name rida-project.com *.rida-project.com;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # The dashboard embeds /preview/* in an iframe from app.rida-project.com;
    # nobody else may frame the site.
    add_header Content-Security-Policy "frame-ancestors 'self' http://app.rida-project.com" always;
    add_header X-Content-Type-Options nosniff always;

    # Hashed build assets are immutable — cache aggressively.
    location /_next/static/ {
        proxy_pass http://landing_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://landing_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# ---------------------------------------------------------------
# Admin panel (Vite SPA, static) + same-origin /api proxy
# Build with: bun run build:client  → src/client/dist/
# Deploy to:  /var/www/govt-project/client
# ---------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name app.rida-project.com;

    root /var/www/govt-project/client;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    # The panel requests /api/v1/* on its own origin (Vite proxies this in
    # dev); forward it to the Hono API.
    location /api/ {
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        # Uploads go through the API to Cloudinary: images/PDFs up to 5 MB as
        # multipart, and pasted-image imports as JSON data URIs (up to ~10 MB).
        client_max_body_size 25m;
    }

    # Hashed Vite assets are immutable.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback — every route is client-side.
    location / {
        try_files $uri /index.html;
    }
}

# ---------------------------------------------------------------
# API (Hono on Node) — optional direct host for external consumers.
# ---------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name api.rida-project.com;

    add_header X-Content-Type-Options nosniff always;

    location / {
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 25m;
    }
}
