# Replacement for /etc/nginx/nginx.conf (Ubuntu stock layout).
# Restore with:
#   sudo cp deploy/nginx-main.conf /etc/nginx/nginx.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# This is the standard Ubuntu top-level config: it owns the http{} block and
# includes conf.d/ and sites-enabled/, where the site config
# (nginx-test.conf / nginx-demo.conf / nginx.conf from this repo) is linked.

user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 768;
}

http {
    sendfile on;
    tcp_nopush on;
    types_hash_max_size 2048;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    access_log /var/log/nginx/access.log;

    gzip on;

    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;
}
