# nginx config for Govt-Project-2-Demo
# Replace example.com and sub1..sub6 with your real domain/subdomains.
# Install: copy to /etc/nginx/sites-available/govt-project.conf,
# symlink into sites-enabled, then `nginx -t && systemctl reload nginx`.

# ---------------------------------------------------------------
# Landing page (Next.js) — 6 subdomains, same content
# Runs via `next start` on 127.0.0.1:3001 (see landing.service)
# ---------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name sub1.example.com
                sub2.example.com
                sub3.example.com
                sub4.example.com
                sub5.example.com
                sub6.example.com;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Next.js HMR/websockets are dev-only, but harmless to allow:
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Serve Next.js static assets with long cache directly
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

# ---------------------------------------------------------------
# Client app (Vite SPA) — served as static files
# Build with: cd src/client && bun run build  → dist/
# ---------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name app.example.com;

    root /var/www/govt-project/client;   # copy src/client/dist here
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed build assets can be cached forever
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

# ---------------------------------------------------------------
# API (Hono) — reverse proxy to the Node process
# Runs dist/index.js on 127.0.0.1:3000 (see api.service)
# ---------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name api.example.com;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Allow larger uploads (banners/images go through the API to Cloudinary)
    client_max_body_size 20m;
}
