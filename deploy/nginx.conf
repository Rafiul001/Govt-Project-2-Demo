# nginx config for Govt-Project-2-Demo — production
#
# Hosts (replace rida-project.com with the real domain):
#   rida-project.com, *.rida-project.com  → landing sites (Next.js on 127.0.0.1:3001);
#                                 the branch is resolved from the subdomain
#                                 (dhaka.rida-project.com → Dhaka), so branches
#                                 created in the dashboard need no nginx change.
#   app.rida-project.com             → admin panel (static Vite build) + /api proxy.
#                                 The panel calls the API at a *relative*
#                                 /api/v1, so the proxy below is required.
#   api.rida-project.com             → (optional) direct API host for external
#                                 consumers; the panel does not need it.
#
# TLS: branch subdomains are dynamic, so use a WILDCARD certificate covering
# rida-project.com and *.rida-project.com (wildcards require the DNS-01 challenge):
#   certbot certonly --preferred-challenges dns \
#     -d rida-project.com -d '*.rida-project.com'
# DNS: an A record for @ and a wildcard A record (*) pointing at this server.
#
# Install:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/govt-project.conf
#   sudo ln -s /etc/nginx/sites-available/govt-project.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

upstream landing_upstream {
    server 127.0.0.1:3001;
    keepalive 16;
}

upstream api_upstream {
    server 127.0.0.1:3000;
    keepalive 16;
}

# ---------------------------------------------------------------
# HTTP → HTTPS redirect (all hosts)
# ---------------------------------------------------------------
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name rida-project.com *.rida-project.com;

    # certbot HTTP-01 renewals (unused with the DNS challenge, harmless to keep)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------
# Landing sites (Next.js) — apex + every branch subdomain
# ---------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name rida-project.com *.rida-project.com;

    ssl_certificate     /etc/letsencrypt/live/rida-project.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rida-project.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # The dashboard embeds /preview/* in an iframe from app.rida-project.com;
    # nobody else may frame the site.
    add_header Content-Security-Policy "frame-ancestors 'self' https://app.rida-project.com" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Hashed build assets are immutable — cache aggressively.
    # (add_header here replaces the server-level headers; static assets
    # don't need the security headers above.)
    location /_next/static/ {
        proxy_pass http://landing_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://landing_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# ---------------------------------------------------------------
# Admin panel (Vite SPA, static) + same-origin /api proxy
# Build with: cd src/client && bun run build  → dist/
# Deploy to:  /var/www/govt-project/client
# ---------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.rida-project.com;

    ssl_certificate     /etc/letsencrypt/live/rida-project.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rida-project.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    root /var/www/govt-project/client;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # The panel requests /api/v1/* on its own origin (Vite proxies this in
    # dev); forward it to the Hono API.
    location /api/ {
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        # Uploads go through the API to Cloudinary: images/PDFs up to 5 MB as
        # multipart, and pasted-image imports as JSON data URIs (up to ~10 MB).
        client_max_body_size 25m;
    }

    # Hashed Vite assets are immutable.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback — every route is client-side.
    location / {
        try_files $uri /index.html;
    }
}

# ---------------------------------------------------------------
# API (Hono on Node) — optional direct host for external consumers.
# The admin panel and the landing SSR do not use this host.
# ---------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.rida-project.com;

    ssl_certificate     /etc/letsencrypt/live/rida-project.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rida-project.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header X-Content-Type-Options nosniff always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 25m;
    }
}
