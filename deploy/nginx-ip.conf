# nginx config for rida-project.com over plain HTTP — no TLS yet.
#
# Hosts:
#   rida-project.com, *.rida-project.com → landing sites (Next.js on
#                                          127.0.0.1:3001); the branch is
#                                          resolved from the subdomain
#                                          (dhaka.rida-project.com → Dhaka),
#                                          so branches created in the
#                                          dashboard need no nginx change.
#                                          The apex/www (and a raw-IP visit,
#                                          via default_server) render the
#                                          branch directory instead.
#   app.rida-project.com                 → admin panel (static Vite build)
#                                          + /api proxy. The panel calls the
#                                          API at a *relative* /api/v1, so
#                                          the proxy below is required.
#
# The API (Hono on 127.0.0.1:3000) is NOT exposed directly; the panel reaches
# it same-origin through the /api proxy, and the landing site reaches it
# server-side via API_BASE_URL=http://localhost:3000.
#
# DNS: A record for @ and a wildcard A record (*) pointing at 103.132.96.122.
#
# Switch to deploy/nginx.conf once the wildcard certificate is issued — the
# site handles logins and uploads, which shouldn't travel unencrypted longer
# than necessary. Enable only ONE of the deploy/*.conf site configs at a
# time — they define the same upstreams and would clash.
#
# Build the front-ends with HTTP origins so previews/postMessage work:
#   VITE_LANDING_URL=http://rida-project.com               (admin panel build)
#   NEXT_PUBLIC_DASHBOARD_URL=http://app.rida-project.com  (landing build)
#
# The panel is served straight from the repo clone's build output at
# /home/Govt-Project-2-Demo/src/client/dist — nginx (www-data) needs execute
# permission on every directory along that path:
#   sudo -u www-data stat /home/Govt-Project-2-Demo/src/client/dist/index.html
#   # if that fails: sudo chmod o+x /home/Govt-Project-2-Demo
#
# Install:
#   sudo cp deploy/nginx-ip.conf /etc/nginx/sites-available/govt-project-ip.conf
#   sudo ln -sf /etc/nginx/sites-available/govt-project-ip.conf /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

upstream landing_upstream {
    server 127.0.0.1:3001;
    keepalive 16;
}

upstream api_upstream {
    server 127.0.0.1:3000;
    keepalive 16;
}

# ---------------------------------------------------------------
# Landing sites (Next.js) — apex + every branch subdomain
# ---------------------------------------------------------------
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name rida-project.com *.rida-project.com;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # The dashboard embeds /preview/* in an iframe from app.rida-project.com;
    # nobody else may frame the site.
    add_header Content-Security-Policy "frame-ancestors 'self' http://app.rida-project.com" always;
    add_header X-Content-Type-Options nosniff always;

    # Hashed build assets are immutable — cache aggressively.
    location /_next/static/ {
        proxy_pass http://landing_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://landing_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# ---------------------------------------------------------------
# Admin panel (Vite SPA, static) + same-origin /api proxy
# Build with: npm run build:client  → src/client/dist/
# ---------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name app.rida-project.com;

    root /home/Govt-Project-2-Demo/src/client/dist;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    # The panel requests /api/v1/* on its own origin (Vite proxies this in
    # dev); forward it to the Hono API.
    location /api/ {
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        # Uploads go through the API to Cloudinary: images/PDFs up to 5 MB as
        # multipart, and pasted-image imports as JSON data URIs (up to ~10 MB).
        client_max_body_size 25m;
    }

    # Hashed Vite assets are immutable.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback — every route is client-side.
    location / {
        try_files $uri /index.html;
    }
}
