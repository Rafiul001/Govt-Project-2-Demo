# nginx config for an IP-ONLY deployment over plain HTTP — no domain, no TLS.
#
# With no domain there are no branch subdomains, so the landing site always
# renders the fallback BRANCH_NAME branch (set in src/landing-page/.env).
# The two front-ends are separated by PORT instead of by hostname:
#
#   http://103.132.96.122       → landing site   (Next.js on 127.0.0.1:3001)
#   http://103.132.96.122:8080  → admin panel    (static Vite build) + /api proxy
#
# The API (Hono on 127.0.0.1:3000) is NOT exposed directly; the panel reaches
# it same-origin through the /api proxy below, and the landing site reaches it
# server-side via API_BASE_URL=http://localhost:3000.
#
# Enable only ONE of nginx.conf / nginx-demo.conf / nginx-test.conf /
# nginx-ip.conf at a time — they define the same upstreams and would clash.
#
# Build the front-ends with these origins so previews/postMessage work:
#   VITE_LANDING_URL=http://103.132.96.122              (admin panel build)
#   NEXT_PUBLIC_DASHBOARD_URL=http://103.132.96.122:8080  (landing build)
#
# The panel is served straight from the repo clone's build output at
# /home/Govt-Project-2-Demo/src/client/dist — nginx (www-data) needs execute
# permission on every directory along that path:
#   sudo -u www-data stat /home/Govt-Project-2-Demo/src/client/dist/index.html
#   # if that fails: sudo chmod o+x /home/Govt-Project-2-Demo
#
# Open the firewall for both ports:
#   sudo ufw allow 80/tcp && sudo ufw allow 8080/tcp
#
# Install:
#   sudo cp deploy/nginx-ip.conf /etc/nginx/sites-available/govt-project-ip.conf
#   sudo ln -sf /etc/nginx/sites-available/govt-project-ip.conf /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

upstream landing_upstream {
    server 127.0.0.1:3001;
    keepalive 16;
}

upstream api_upstream {
    server 127.0.0.1:3000;
    keepalive 16;
}

# ---------------------------------------------------------------
# Landing site (Next.js) — port 80, fallback branch only
# ---------------------------------------------------------------
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # The dashboard embeds /preview/* in an iframe from the panel origin;
    # nobody else may frame the site.
    add_header Content-Security-Policy "frame-ancestors 'self' http://103.132.96.122:8080" always;
    add_header X-Content-Type-Options nosniff always;

    # Hashed build assets are immutable — cache aggressively.
    location /_next/static/ {
        proxy_pass http://landing_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://landing_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# ---------------------------------------------------------------
# Admin panel (Vite SPA, static) + same-origin /api proxy — port 8080
# Build with: npm run build:client  → src/client/dist/
# ---------------------------------------------------------------
server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name _;

    root /home/Govt-Project-2-Demo/src/client/dist;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    # The panel requests /api/v1/* on its own origin (Vite proxies this in
    # dev); forward it to the Hono API.
    location /api/ {
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        # Uploads go through the API to Cloudinary: images/PDFs up to 5 MB as
        # multipart, and pasted-image imports as JSON data URIs (up to ~10 MB).
        client_max_body_size 25m;
    }

    # Hashed Vite assets are immutable.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback — every route is client-side.
    location / {
        try_files $uri /index.html;
    }
}
