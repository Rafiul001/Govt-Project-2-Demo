# nginx config for TESTING on a KVM/LAN Ubuntu server — HTTP only, no TLS.
#
# Use this to verify the full production topology (nginx + systemd units)
# inside a VM before touching real DNS/certificates. For a public demo over
# HTTP use nginx-demo.conf; for real production use nginx.conf (TLS).
# Enable only ONE of the three configs at a time — they define the same
# upstreams and would clash.
#
# There is no public DNS in this setup, so map the hosts to the VM's IP in
# /etc/hosts ON THE MACHINE RUNNING THE BROWSER (your host, not the VM), e.g.:
#
#   192.168.122.50  example.com app.example.com api.example.com
#   192.168.122.50  dhaka.example.com barishal.example.com sylhet.example.com
#
# /etc/hosts does not support wildcards — add one line per branch you create
# in the dashboard (the subdomain is the lowercased branch name).
#
# Build the front-ends with HTTP origins so previews/postMessage work:
#   VITE_LANDING_URL=http://example.com            (admin panel build)
#   NEXT_PUBLIC_DASHBOARD_URL=http://app.example.com  (landing build)
#
# Install:
#   sudo cp deploy/nginx-test.conf /etc/nginx/sites-available/govt-project-test.conf
#   sudo ln -s /etc/nginx/sites-available/govt-project-test.conf /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

upstream landing_upstream {
    server 127.0.0.1:3001;
    keepalive 16;
}

upstream api_upstream {
    server 127.0.0.1:3000;
    keepalive 16;
}

# ---------------------------------------------------------------
# Landing sites (Next.js) — apex + every branch subdomain.
# default_server so a raw-IP visit lands here too (it renders the
# BRANCH_NAME fallback branch only if the IP's first octet isn't
# mistaken for a subdomain — prefer the /etc/hosts names).
# ---------------------------------------------------------------
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name example.com *.example.com;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # The dashboard embeds /preview/* in an iframe from app.example.com.
    add_header Content-Security-Policy "frame-ancestors 'self' http://app.example.com" always;
    add_header X-Content-Type-Options nosniff always;

    location /_next/static/ {
        proxy_pass http://landing_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://landing_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# ---------------------------------------------------------------
# Admin panel (Vite SPA, static) + same-origin /api proxy
# Deploy build to: /var/www/govt-project/client
# ---------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name app.example.com;

    root /var/www/govt-project/client;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    # The panel requests /api/v1/* on its own origin.
    location /api/ {
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 25m;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri /index.html;
    }
}

# ---------------------------------------------------------------
# API (Hono on Node) — optional direct host, handy for curl tests.
# ---------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name api.example.com;

    location / {
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 25m;
    }
}
